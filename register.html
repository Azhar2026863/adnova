<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register - AdNova</title>

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.box{
    background:white;
    width:90%;
    max-width:400px;
    padding:30px;
    border-radius:12px;
    box-shadow:0 4px 20px rgba(0,0,0,.1);
}

h2{
    text-align:center;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:15px;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:6px;
    font-size:16px;
    cursor:pointer;
}

.message{
    text-align:center;
    margin-top:15px;
    font-size:14px;
}

a{
    color:#2563eb;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="box">

<h2>Create Account</h2>

<form id="registerForm">

<input
type="text"
id="name"
placeholder="Full Name"
required
>

<input
type="email"
id="email"
placeholder="Email"
required
>

<input
type="password"
id="password"
placeholder="Password"
required
>

<input
type="password"
id="confirmPassword"
placeholder="Confirm Password"
required
>

<button type="submit">
Create Account
</button>

</form>

<div class="message" id="message"></div>

<p style="text-align:center;margin-top:20px;">
Already have an account?
<a href="login.html">Login</a>
</p>

</div>

<script>

document.getElementById("registerForm").addEventListener("submit",function(e){

e.preventDefault();

const name =
document.getElementById("name").value.trim();

const email =
document.getElementById("email").value.trim();

const password =
document.getElementById("password").value;

const confirmPassword =
document.getElementById("confirmPassword").value;

const message =
document.getElementById("message");


if(password !== confirmPassword){

message.innerHTML =
"Passwords do not match.";

return;

}


let users =
JSON.parse(localStorage.getItem("adnovaUsers")) || [];


const existingUser =
users.find(function(user){

return user.email === email;

});


if(existingUser){

message.innerHTML =
"This email is already registered.";

return;

}


const newUser = {

name:name,

email:email,

password:password

};


users.push(newUser);


localStorage.setItem(
"adnovaUsers",
JSON.stringify(users)
);


localStorage.setItem(
"adnovaLoggedInUser",
JSON.stringify(newUser)
);


message.innerHTML =
"Account created successfully!";


setTimeout(function(){

window.location.href =
"plans.html";

},1000);


});

</script>

</body>
</html>
