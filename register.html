<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard - AdNova</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f6f9;
    color:#222;
}

.sidebar{
    position:fixed;
    left:0;
    top:0;
    width:240px;
    height:100vh;
    background:#111827;
    color:white;
    padding:20px;
}

.logo{
    font-size:24px;
    font-weight:bold;
    margin-bottom:30px;
}

.sidebar a{
    display:block;
    color:#d1d5db;
    text-decoration:none;
    padding:12px;
    margin:5px 0;
    border-radius:8px;
}

.sidebar a:hover{
    background:#2563eb;
    color:white;
}

.main{
    margin-left:240px;
    padding:25px;
}

.header{
    background:white;
    padding:20px;
    border-radius:12px;
    margin-bottom:25px;
    box-shadow:0 2px 10px rgba(0,0,0,.05);
}

.header h1{
    font-size:26px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:20px;
}

.card{
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 2px 10px rgba(0,0,0,.05);
}

.card h3{
    color:#6b7280;
    font-size:15px;
    margin-bottom:10px;
}

.card p{
    font-size:28px;
    font-weight:bold;
}

.section{
    margin-top:25px;
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 2px 10px rgba(0,0,0,.05);
}

.section h2{
    margin-bottom:20px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:14px;
    border-bottom:1px solid #eee;
    text-align:left;
}

.status{
    background:#dcfce7;
    color:#166534;
    padding:5px 10px;
    border-radius:20px;
}

@media(max-width:800px){
    .sidebar{
        width:200px;
    }

    .main{
        margin-left:200px;
    }

    .cards{
        grid-template-columns:repeat(2,1fr);
    }
}

    .sidebar{
        position:relative;
        width:100%;
