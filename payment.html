<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AdNova Payment</title>

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f6f9;
    min-height:100vh;
}

.header{
    background:#0077ff;
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    width:90%;
    max-width:500px;
    margin:25px auto;
}

.box{
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 3px 15px rgba(0,0,0,.1);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

.payment-info{
    background:#eef5ff;
    padding:18px;
    border-radius:8px;
    margin-bottom:20px;
}

.payment-info p{
    margin:10px 0;
    font-size:16px;
}

.amount{
    font-size:24px;
    font-weight:bold;
    color:#0077ff;
}

label{
    display:block;
    margin-top:15px;
    margin-bottom:6px;
    font-weight:bold;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:15px;
}

button{
    width:100%;
    padding:13px;
    margin-top:20px;
    background:#0077ff;
    color:white;
    border:none;
    border-radius:6px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#005fcc;
}

.message{
    text-align:center;
    margin-top:15px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
    <h1>AdNova Payment</h1>
</div>

<div class="container">

<div class="box">

<h2>Complete Your Payment</h2>

<div class="payment-info">

<p>
<strong>Selected Package:</strong>
<span id="planName">Loading...</span>
</p>

<p>
<strong>Payment Amount:</strong>
<span class="amount" id="planPrice">Loading...</span>
</p>

<hr>

<p>
<strong>Payment Method:</strong>
EasyPaisa
</p>

<p>
<strong>Account Name:</strong>
Muhammad Sajid
</p>

<p>
<strong>Account Number:</strong>
03482529433
</p>

</div>

<form id="paymentForm">

<label>Transaction ID</label>

<input
type="text"
id="transactionId"
placeholder="Enter Transaction ID"
required
>

<label>Payment Screenshot</label>

<input
type="file"
id="paymentScreenshot"
accept="image/*"
required
>

<button type="submit">
Submit Payment
</button>

</form>

<div class="message" id="message"></div>

</div>

</div>

<script>

const loggedInUser =
JSON.parse(localStorage.getItem("adnovaLoggedInUser"));

const selectedPlan =
JSON.parse(localStorage.getItem("adnovaSelectedPlan"));

if(!loggedInUser){

window.location.href = "login.html";

}

if(!selectedPlan){

window.location.href = "plans.html";

}

document.getElementById("planName").innerText =
selectedPlan.plan;

document.getElementById("planPrice").innerText =
selectedPlan.price;


document.getElementById("paymentForm")
.addEventListener("submit", function(e){

e.preventDefault();

const transactionId =
document.getElementById("transactionId").value.trim();

const screenshot =
document.getElementById("paymentScreenshot").files[0];

if(!screenshot){

document.getElementById("message").innerText =
"Please upload payment screenshot.";

return;

}

let payments =
JSON.parse(localStorage.getItem("adnovaPayments")) || [];

const newPayment = {

name: loggedInUser.name,

email: loggedInUser.email,

plan: selectedPlan.plan,

price: selectedPlan.price,

transactionId: transactionId,

screenshotName: screenshot.name,

status: "Pending",

date: new Date().toLocaleString()

};

payments.push(newPayment);

localStorage.setItem(
"adnovaPayments",
JSON.stringify(payments)
);

document.getElementById("message").innerText =
"Payment submitted successfully. Waiting for Admin approval.";

document.getElementById("paymentForm").reset();

});

</script>

</body>
</html>
