<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Payment - AdNova</title>

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f6f9;
    min-height:100vh;
}

.header{
    background:#2563eb;
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    width:90%;
    max-width:500px;
    margin:30px auto;
}

.box{
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 4px 15px rgba(0,0,0,.1);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

.plan{
    background:#f1f5f9;
    padding:15px;
    border-radius:8px;
    margin-bottom:20px;
}

.plan p{
    margin:8px 0;
}

input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:6px;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:6px;
    font-size:16px;
    cursor:pointer;
}

.back{
    background:#6b7280;
}

.message{
    text-align:center;
    margin-top:15px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
<h1>AdNova Payment</h1>
</div>

<div class="container">

<div class="box">

<h2>Confirm Your Plan</h2>

<div class="plan">

<p><strong>Plan:</strong>
<span id="planName">Loading...</span>
</p>

<p><strong>Price:</strong>
<span id="planPrice">Loading...</span>
</p>

</div>

<form id="paymentForm">

<input
type="text"
id="transactionId"
placeholder="Enter Transaction ID"
required
>

<input
type="text"
id="paymentMethod"
placeholder="Payment Method (e.g. JazzCash)"
required
>

<button type="submit">
Submit Payment
</button>

</form>

<button class="back" onclick="goBack()">
Back to Plans
</button>

<div class="message" id="message"></div>

</div>

</div>

<script>

const loggedInUser =
JSON.parse(localStorage.getItem("adnovaLoggedInUser"));

const selectedPlan =
JSON.parse(localStorage.getItem("adnovaSelectedPlan"));

if(!loggedInUser){

window.location.href="login.html";

}

if(!selectedPlan){

window.location.href="plans.html";

}

document.getElementById("planName").innerText =
selectedPlan.plan;

document.getElementById("planPrice").innerText =
selectedPlan.price;


document.getElementById("paymentForm")
.addEventListener("submit",function(e){

e.preventDefault();

const transactionId =
document.getElementById("transactionId").value.trim();

const paymentMethod =
document.getElementById("paymentMethod").value.trim();

let payments =
JSON.parse(localStorage.getItem("adnovaPayments")) || [];

const newPayment = {

user: loggedInUser.email,

plan: selectedPlan.plan,

price: selectedPlan.price,

transactionId: transactionId,

paymentMethod: paymentMethod,

status: "Pending",

date: new Date().toLocaleString()

};

payments.push(newPayment);

localStorage.setItem(
"adnovaPayments",
JSON.stringify(payments)
);

document.getElementById("message").innerHTML =
"Payment submitted successfully!";

document.getElementById("paymentForm").reset();

});


function goBack(){

window.location.href="plans.html";

}

</script>

</body>
</html>
