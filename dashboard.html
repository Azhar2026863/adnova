
<!DOCTYPE html>
<html>
<head>
    <title>AdNova Dashboard</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f2f2f2;
            margin:0;
        }

        .header{
            background:#111827;
            color:white;
            padding:20px;
            text-align:center;
        }

        .box{
            background:white;
            margin:20px;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px #ccc;
        }

        .btn{
            background:#2563eb;
            color:white;
            padding:12px 20px;
            border:none;
            border-radius:5px;
            text-decoration:none;
        }

        .balance{
            font-size:25px;
            color:green;
        }
    </style>
</head>

<body>

<div class="header">
    <h1>AdNova Dashboard</h1>
    <p>Welcome User</p>
</div>

<div class="box">
    <h2>Your Balance</h2>
    <p class="balance">Rs 0</p>
</div>

<div class="box">
    <h2>Membership Plan</h2>
    <p>Current Plan: No Plan</p>
    <a class="btn" href="#">Buy Plan</a>
</div>

<div class="box">
    <h2>Account</h2>
    <p>Name: User</p>
    <p>Status: Active</p>
</div>

</body>
</html>
