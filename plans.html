<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AdNova Plans</title>

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f6f9;
    min-height:100vh;
}

.header{
    background:#2563eb;
    color:white;
    padding:20px;
    text-align:center;
}

.container{
    width:90%;
    max-width:1000px;
    margin:30px auto;
}

h2{
    text-align:center;
    margin-bottom:25px;
}

.plans{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.plan{
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 4px 15px rgba(0,0,0,.1);
    text-align:center;
}

.plan h3{
    font-size:24px;
    margin-bottom:15px;
}

.price{
    font-size:30px;
    font-weight:bold;
    color:#2563eb;
    margin-bottom:15px;
}

.plan p{
    margin:10px 0;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:6px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.logout{
    background:#dc2626;
    max-width:200px;
    display:block;
    margin:25px auto;
}

.message{
    text-align:center;
    margin-top:20px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
    <h1>AdNova</h1>
    <p>Select Your Package</p>
</div>

<div class="container">

<h2>Available Plans</h2>

<div class="plans">

<div class="plan">
<h3>Starter</h3>
<div class="price">$10</div>
<p>Basic Package</p>
<p>Duration: 30 Days</p>
<p>Daily Return: 1%</p>
<button onclick="selectPlan('Starter','$10')">
Select Plan
</button>
</div>

<div class="plan">
<h3>Standard</h3>
<div class="price">$50</div>
<p>Standard Package</p>
<p>Duration: 30 Days</p>
<p>Daily Return: 2%</p>
<button onclick="selectPlan('Standard','$50')">
Select Plan
</button>
</div>

<div class="plan">
<h3>Premium</h3>
<div class="price">$100</div>
<p>Premium Package</p>
<p>Duration: 30 Days</p>
<p>Daily Return: 3%</p>
<button onclick="selectPlan('Premium','$100')">
Select Plan
</button>
</div>

</div>

<div class="message" id="message"></div>

<button class="logout" onclick="logout()">
Logout
</button>

</div>

<script>

const loggedInUser =
JSON.parse(localStorage.getItem("adnovaLoggedInUser"));

if(!loggedInUser){
    window.location.href = "login.html";
}

function selectPlan(planName, price){

    const selectedPlan = {
        plan: planName,
        price: price,
        user: loggedInUser.email
    };

    localStorage.setItem(
        "adnovaSelectedPlan",
        JSON.stringify(selectedPlan)
    );

    document.getElementById("message").innerHTML =
    "Plan selected successfully!";

    setTimeout(function(){
        window.location.href = "payment.html";
    },1000);
}

function logout(){

    localStorage.removeItem("adnovaLoggedInUser");

    window.location.href = "login.html";
}

</script>

</body>
</html>
