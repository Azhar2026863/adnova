<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AdNova Login</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f4f4f4;
}
.container{
    width:320px;
    margin:80px auto;
    background:#fff;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}
h2{
    text-align:center;
    color:#0077ff;
}
input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
    box-sizing:border-box;
}
button{
    width:100%;
    padding:12px;
    background:#0077ff;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}
button:hover{
    background:#005fcc;
}
p{
    text-align:center;
}
a{
    color:#0077ff;
    text-decoration:none;
}
</style>

</head>
<body>

<div class="container">
<h2>AdNova Login</h2>

<form action="admin.html">
<input type="email" placeholder="Email" required>

<input type="password" placeholder="Password" required>

<button type="submit">Login</button>
</form>

<p>Don't have an account?</p>
<p><a href="register.html">Create Account</a></p>

</div>

</body>
</html>
