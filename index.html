<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AdNova</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f4f4f4;
}

header{
    background:#0d6efd;
    color:#fff;
    text-align:center;
    padding:20px;
}

.container{
    max-width:900px;
    margin:40px auto;
    text-align:center;
}

.card{
    background:#fff;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.2);
}

h2{
    color:#0d6efd;
}

p{
    color:#555;
}

.btn{
    display:inline-block;
    margin:10px;
    padding:12px 25px;
    background:#0d6efd;
    color:#fff;
    text-decoration:none;
    border-radius:6px;
}

.btn:hover{
    background:#084298;
}
</style>
</head>

<body>

<header>
    <h1>AdNova</h1>
</header>

<div class="container">
    <div class="card">
        <h2>Welcome to AdNova</h2>
        <p>Official AdNova Website</p>

        <a href="login.html" class="btn">Login</a>
        <a href="register.html" class="btn">Register</a>
    </div>
</div>

</body>
</html>
