<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard - AdNova</title>

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:Arial,sans-serif;
}

body{
  background:#f4f6f9;
  color:#222;
}

.sidebar{
  position:fixed;
  left:0;
  top:0;
  width:230px;
  height:100vh;
  background:#111827;
  color:white;
  padding:20px;
}

.sidebar h2{
  margin-bottom:30px;
}

.sidebar a{
  display:block;
  color:white;
  text-decoration:none;
  padding:12px;
  margin:6px 0;
  border-radius:6px;
}

.sidebar a:hover{
  background:#2563eb;
}

.main{
  margin-left:230px;
  padding:25px;
}

.header{
  background:white;
  padding:20px;
  border-radius:10px;
  margin-bottom:20px;
}

.cards{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
}

.card{
  background:white;
  padding:20px;
  border-radius:10px;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.card h3{
  margin-bottom:10px;
}

.card p{
  font-size:28px;
  font-weight:bold;
}

.section{
  background:white;
  margin-top:20px;
  padding:20px;
  border-radius:10px;
  overflow-x:auto;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:15px;
}

th,td{
  padding:12px;
  border-bottom:1px solid #ddd;
  text-align:left;
}

button{
  padding:8px 12px;
  border:0;
  border-radius:5px;
  cursor:pointer;
}

.approve{
  background:#16a34a;
  color:white;
}

.reject{
  background:#dc2626;
  color:white;
}

@media(max-width:700px){
  .sidebar{
    width:100%;
    height:auto;
    position:relative;
  }

  .main{
    margin-left:0;
  }

  .cards{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>AdNova Admin</h2>

  <a href="dashboard.html">Dashboard</a>
  <a href="../users.html">Users</a>
  <a href="../deposits.html">Deposits</a>
  <a href="../withdrawals.html">Withdrawals</a>
  <a href="../settings.html">Settings</a>
  <a href="../index.html">Logout</a>
</div>

<div class="main">

  <div class="header">
    <h1>Admin Dashboard</h1>
    <p>Manage your AdNova website</p>
  </div>

  <div class="cards">

    <div class="card">
      <h3>Total Users</h3>
      <p id="totalUsers">0</p>
    </div>

    <div class="card">
      <h3>Total Payments</h3>
      <p id="totalPayments">0</p>
    </div>

    <div class="card">
      <h3>Pending Payments</h3>
      <p id="pendingPayments">0</p>
    </div>

  </div>

  <div class="section">
    <h2>Payment Requests</h2>

    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Plan</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>

      <tbody id="paymentTable">
      </tbody>
    </table>

  </div>

</div>

<script>

let users = JSON.parse(localStorage.getItem("adnovaUsers")) || [];
let payments = JSON.parse(localStorage.getItem("adnovaPayments")) || [];

document.getElementById("totalUsers").innerText = users.length;

document.getElementById("totalPayments").innerText = payments.length;

let pending = payments.filter(p => p.status === "Pending").length;

document.getElementById("pendingPayments").innerText = pending;

let table = document.getElementById("paymentTable");

if(payments.length === 0){

  table.innerHTML = `
  <tr>
    <td colspan="5">No payment requests yet.</td>
  </tr>
  `;

}else{

  payments.forEach((payment,index)=>{

    let row = document.createElement("tr");

    row.innerHTML = `
      <td>${payment.name || "N/A"}</td>
      <td>${payment.email || "N/A"}</td>
      <td>${payment.plan || "N/A"}</td>
      <td>${payment.status || "Pending"}</td>
      <td>
        <button class="approve" onclick="approvePayment(${index})">
          Approve
        </button>

        <button class="reject" onclick="rejectPayment(${index})">
          Reject
        </button>
      </td>
    `;

    table.appendChild(row);

  });

}

function approvePayment(index){

  payments[index].status = "Approved";

  localStorage.setItem(
    "adnovaPayments",
    JSON.stringify(payments)
  );

  location.reload();
}

function rejectPayment(index){

  payments[index].status = "Rejected";

  localStorage.setItem(
    "adnovaPayments",
    JSON.stringify(payments)
  );

  location.reload();
}

</script>

</body>
</html>
